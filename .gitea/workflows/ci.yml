name: CI

on:
  push:
    branches: 
      - dev
  pull_request:
    branches: 
      - dev

jobs:
  build:
    runs-on: ubuntu-latest # Ensure your Gitea runner is configured with this label or Change it to your runner label

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build
